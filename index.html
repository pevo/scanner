<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- STATUS BAR MODE — measured behavior on iOS 26.x (iPhone 15 Pro):
     "black-translucent" (full-bleed) is BROKEN in the iOS 26 web-app container
     (verified on 26.1 AND 26.5.2): the view is sized 59px short and anchored at
     the screen top, leaving an unpaintable strip at the bottom (outside the
     drawing surface — no CSS/JS can cover it; WebKit #301994 was the 26.1
     variant). "black" (opaque) is the only config with no dead pixels: the view
     sits below a black system status bar, flush to the screen bottom.
     If a future iOS restores translucent full-bleed, switch this back to
     "black-translucent" and reinstall the Home Screen app to test. -->
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<title>Plate Scanner</title>
<!-- Import map so the LOCAL (same-origin) @litertjs/core resolves its bare
     `@litertjs/wasm-utils` dependency. Without it that import throws and the
     app silently falls back to the jsdelivr CDN — which breaks the threaded
     wasm build, whose pthread Worker cannot be constructed from a cross-origin
     (CDN) script under COEP. Same-origin runtime is required for multi-core. -->
<script type="importmap">
{
  "imports": {
    "@litertjs/wasm-utils": "./node_modules/@litertjs/wasm-utils/dist/index.js"
  }
}
</script>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22e6; --border: #2a2f3a;
    --text: #e6e9ef; --muted: #9aa3b2; --accent: #4da3ff; --ok: #3ddc84; --warn: #ffb347; --err: #ff6b6b;
    --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px); --safe-right: env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; color: var(--text);
               font: 15px/1.4 system-ui, -apple-system, sans-serif; }

  /* 100lvh = full screen incl. safe areas; iOS standalone PWAs report the
     layout viewport short of the home-indicator zone, leaving a bottom bar
     if the stage is sized with inset:0 / 100vh. */
  #stage { position: fixed; top: 0; left: 0; width: 100vw; width: 100lvw;
           height: 100vh; height: 100lvh; background: #000; }
  #video { width: 100%; height: 100%; object-fit: cover; }
  #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  #hud { position: fixed; top: 0; left: 0; right: 0;
         padding: calc(var(--safe-top) + 8px) calc(var(--safe-right) + 12px) 8px calc(var(--safe-left) + 12px);
         display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--muted);
         background: linear-gradient(#000c, #0000); pointer-events: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; display: inline-block; margin-right: 4px; }
  .dot.ok { background: var(--ok); } .dot.warn { background: var(--warn); } .dot.err { background: var(--err); }
  #hud .spacer { flex: 1; }

  #toasts { position: fixed; top: calc(var(--safe-top) + 44px);
            left: calc(var(--safe-left) + 12px); right: calc(var(--safe-right) + 12px); z-index: 30;
            display: flex; flex-direction: column; align-items: flex-start; gap: 6px; pointer-events: none; }
  .toast { background: var(--panel); border: 1px solid var(--border); border-left: 3px solid var(--accent);
           border-radius: 8px; padding: 6px 9px; backdrop-filter: blur(8px); font-size: 12px;
           max-width: min(300px, 80vw); animation: slidein .25s ease; }
  .toast.seen { border-left-color: var(--warn); }
  .toast.new  { border-left-color: var(--ok); }
  .toast b { font-size: 13px; letter-spacing: .05em; }
  .toast .rows { color: var(--muted); margin-top: 2px; font-size: 11px; }
  /* aggregate toast shown when a burst of plates would otherwise flood the screen */
  .toast.more { border-left-color: var(--muted); color: var(--muted); font-size: 11px; padding: 5px 9px; }
  .toast.fadeout { transition: opacity .4s; opacity: 0; }
  @keyframes slidein { from { transform: translateY(-8px); opacity: 0; } }

  #controls { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
              padding: 10px calc(var(--safe-right) + 12px) calc(var(--safe-bottom) + 12px) calc(var(--safe-left) + 12px);
              display: flex; gap: 10px; background: linear-gradient(#0000, #000c); }
  button { border: 1px solid var(--border); background: var(--panel); color: var(--text);
           border-radius: 12px; padding: 12px 14px; font-size: 15px; font-weight: 600;
           backdrop-filter: blur(8px); }
  #startBtn { flex: 2; background: var(--accent); color: #06213c; border: 0; }
  #startBtn.stop { background: var(--err); color: #fff; }
  #settingsBtn, #listBtn { flex: 1; }

  .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 40; max-height: 75%;
           background: #14171d; border-top: 1px solid var(--border); border-radius: 16px 16px 0 0;
           padding: 16px calc(var(--safe-right) + 16px) calc(var(--safe-bottom) + 16px) calc(var(--safe-left) + 16px);
           overflow-y: auto;
           transform: translateY(105%); transition: transform .25s ease; }
  .sheet.open { transform: translateY(0); }
  .sheet h2 { margin: 0 0 12px; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
  .sheet h2 button { padding: 6px 12px; font-size: 13px; }
  .field { margin: 12px 0; }
  .field label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 4px; }
  .field input[type=number] { width: 110px; background: #0d0f13; color: var(--text); border: 1px solid var(--border);
                              border-radius: 8px; padding: 8px; font-size: 15px; }
  .field input[type=range] { width: 100%; }
  .field select { width: 100%; background: #0d0f13; color: var(--text); border: 1px solid var(--border);
                  border-radius: 8px; padding: 8px; font-size: 15px; }
  .field .val { color: var(--accent); font-weight: 600; }
  table { border-collapse: collapse; width: 100%; font-size: 12px; }
  th, td { border-bottom: 1px solid var(--border); padding: 6px 6px; text-align: left; }
  th { color: var(--muted); font-weight: 600; }
  td.plate { font-weight: 700; letter-spacing: .05em; }
  .rowbtns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .rowbtns button { flex: 1 1 40%; font-size: 13px; padding: 10px; }
  #status { position: fixed; bottom: calc(var(--safe-bottom) + 74px);
            left: calc(var(--safe-left) + 12px); right: calc(var(--safe-right) + 12px); z-index: 10;
            text-align: center; font-size: 12px; color: var(--muted); text-shadow: 0 1px 2px #000; }

  #summaryBackdrop { position: fixed; inset: 0; z-index: 60; display: none;
                     align-items: center; justify-content: center; padding: 24px;
                     background: #000a; backdrop-filter: blur(4px); }
  #summaryBackdrop.open { display: flex; }
  #summaryCard { background: #14171d; border: 1px solid var(--border); border-radius: 16px;
                 padding: 20px; width: 100%; max-width: 340px; text-align: center;
                 animation: slidein .2s ease; }
  #summaryCard h2 { margin: 0 0 14px; font-size: 18px; }
  #sumStats { display: flex; gap: 10px; margin-bottom: 18px; }
  .stat { flex: 1; background: #0d0f13; border: 1px solid var(--border); border-radius: 12px; padding: 12px 8px; }
  .stat .num { font-size: 26px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.25; }
  #sumStats .stat.seen .num { color: var(--warn); }
  #sumExtra { font-size: 12px; color: var(--muted); margin: -8px 0 16px; }
  #sumClose { width: 100%; background: var(--accent); color: #06213c; border: 0; }

  img.thumb { width: 56px; height: 32px; object-fit: cover; border-radius: 4px;
              border: 1px solid var(--border); display: block; background: #0d0f13; }
  td.thumbcell { width: 62px; padding: 4px 6px; }
  #lightbox { position: fixed; inset: 0; z-index: 70; display: none; align-items: center;
              justify-content: center; background: #000d; padding: 24px; }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }

  /* startup 3D voxel-logo splash (above the black video, below HUD/controls) */
  #splash { position: fixed; inset: 0; z-index: 8; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 18px; pointer-events: none;
            transition: opacity .6s ease; }
  #splash.hide { opacity: 0; }
  #splashCanvas { filter: drop-shadow(0 8px 30px #000a); }
  #splashWord { font-size: 13px; letter-spacing: .32em; text-transform: uppercase;
                color: var(--muted); text-shadow: 0 1px 3px #000; }

  #pruneBackdrop { position: fixed; inset: 0; z-index: 65; display: none;
                   align-items: center; justify-content: center; padding: 20px;
                   background: #000a; backdrop-filter: blur(4px); }
  #pruneBackdrop.open { display: flex; }
  #pruneCard { background: #14171d; border: 1px solid var(--border); border-radius: 16px;
               padding: 18px; width: 100%; max-width: 380px; max-height: 80%; overflow-y: auto;
               animation: slidein .2s ease; }
  #pruneCard h2 { margin: 0 0 12px; font-size: 17px; }
  .merge { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .merge input { margin-top: 3px; width: 18px; height: 18px; flex: 0 0 auto; }
  .merge .m-main { font-size: 14px; }
  .merge .m-main b { letter-spacing: .05em; }
  .merge .m-sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .merge .bad { color: var(--warn); } .merge .good { color: var(--ok); }
</style>
</head>
<body>

<div id="stage"><!-- height also enforced by fitStage() in JS -->
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<!-- startup splash: the app logo built from giant 3D cubes (voxels), gently
     precessing so its 3D form reads, with oil-slick iridescent shading. Hidden
     once scanning starts. Rendered by the splash engine near the bottom of the
     module. -->
<div id="splash">
  <canvas id="splashCanvas"></canvas>
  <div id="splashWord">Plate Scanner</div>
</div>

<div id="hud">
  <span><span class="dot" id="dotModel"></span>model</span>
  <span><span class="dot" id="dotCam"></span>camera</span>
  <span><span class="dot" id="dotGps"></span>gps</span>
  <span class="spacer"></span>
  <span id="perf"></span>
</div>

<div id="toasts"></div>
<div id="status">Tap Start to load models and open the camera.</div>

<!-- ============ drive summary popup ============ -->
<div id="summaryBackdrop">
  <div id="summaryCard" role="dialog" aria-modal="true" aria-labelledby="sumTitle">
    <h2 id="sumTitle">Drive summary</h2>
    <div id="sumStats"></div>
    <div id="sumExtra"></div>
    <button id="sumClose">Done</button>
  </div>
</div>

<div id="lightbox"><img alt="plate capture"></div>

<!-- ============ prune / merge-misreads modal ============ -->
<div id="pruneBackdrop">
  <div id="pruneCard" role="dialog" aria-modal="true" aria-labelledby="pruneTitle">
    <h2 id="pruneTitle">Merge misread plates</h2>
    <div id="pruneBody"></div>
    <div class="rowbtns">
      <button id="pruneCancel">Cancel</button>
      <button id="pruneApply">Merge selected</button>
    </div>
  </div>
</div>

<div id="controls">
  <button id="startBtn">▶ Start</button>
  <button id="settingsBtn">⚙︎</button>
  <button id="listBtn">☰</button>
</div>

<!-- ============ settings sheet ============ -->
<div class="sheet" id="settingsSheet">
  <h2>Settings <span><span id="appVer" style="color:var(--muted);font-size:11px;margin-right:10px"></span><button data-close>Done</button></span></h2>
  <div class="field">
    <label>Ignore repeat sightings of the same plate within (minutes)</label>
    <input type="number" id="setDedupMin" min="0" step="1" value="60">
  </div>
  <div class="field">
    <label>Detector model (accuracy vs. speed) — takes effect next Start</label>
    <select id="setDetModel">
      <option value="auto">Automatic (fastest for this device)</option>
      <option value="float32">Most accurate (float32, slowest)</option>
      <option value="float16">Accurate (float16)</option>
      <option value="dynrange">Fast (dynamic-range 8-bit)</option>
      <option value="int8">Fastest (full 8-bit)</option>
    </select>
  </div>
  <div class="field">
    <label>Detection score threshold: <span class="val" id="setScoreVal">0.35</span></label>
    <input type="range" id="setScore" min="0.10" max="0.90" step="0.05" value="0.35">
  </div>
  <div class="field">
    <label>Min OCR character confidence: <span class="val" id="setOcrConfVal">0.50</span></label>
    <input type="range" id="setOcrConf" min="0.10" max="0.95" step="0.05" value="0.50">
  </div>
  <div class="field">
    <label>Confirmations needed before logging (consecutive frames with same read)</label>
    <input type="number" id="setConfirm" min="1" max="10" step="1" value="2">
  </div>
  <div class="field">
    <label>Toast duration (seconds)</label>
    <input type="number" id="setToastSec" min="2" max="30" step="1" value="6">
  </div>
  <div class="field">
    <label>Zoom (pinch the camera too): <span class="val" id="setZoomVal">1.0×</span></label>
    <input type="range" id="setZoom" min="1" max="8" step="0.5" value="1">
  </div>
  <div class="field">
    <label>Run detector every N camera frames (higher = cooler/less battery, laggier boxes)</label>
    <input type="number" id="setFrameEvery" min="1" max="5" step="1" value="1">
  </div>
  <div class="field">
    <label>Clean up misread plates — find plates likely misread by OCR and merge their
           sightings into the correct (more-seen) similar plate</label>
    <button id="pruneBtn" style="width:100%">Scan for misread plates…</button>
  </div>
  <div id="diag" style="color:var(--muted);font-size:11px;margin-top:14px;font-variant-numeric:tabular-nums"></div>
</div>

<!-- ============ sightings sheet ============ -->
<div class="sheet" id="listSheet">
  <h2>Sightings <span><span id="dbCount" style="color:var(--muted);font-size:12px;margin-right:10px"></span><button data-close>Done</button></span></h2>
  <div style="color:var(--muted);font-size:11px;margin-bottom:8px">Tap a row to add or edit a note for that plate.</div>
  <div id="listWrap">Loading…</div>
  <div class="rowbtns">
    <button id="importBtn">Import</button>
    <button id="exportBtn">Export CSV</button>
    <button id="exportZipBtn">Export ZIP (+photos)</button>
    <button id="clearBtn" style="color:var(--err)">Delete all</button>
  </div>
  <input type="file" id="importFile" accept=".csv,.zip,text/csv,application/zip" hidden>
</div>

<script type="module">
// ---------------- LiteRT.js loading (local first, CDN fallback) ----------------
let loadLiteRt, loadAndCompile, Tensor, WASM_PATH;
try {
  ({ loadLiteRt, loadAndCompile, Tensor } = await import('./node_modules/@litertjs/core/dist/index.js'));
  WASM_PATH = './node_modules/@litertjs/core/wasm/';
} catch {
  ({ loadLiteRt, loadAndCompile, Tensor } = await import('https://cdn.jsdelivr.net/npm/@litertjs/core/+esm'));
  WASM_PATH = 'https://cdn.jsdelivr.net/npm/@litertjs/core/wasm/';
}
const hasJspi = typeof WebAssembly !== 'undefined' && 'Suspending' in WebAssembly;

const APP_VERSION = 'v3.6';
let rtBuild = '—';            // which LiteRT wasm build actually loaded (threaded/jspi/default/compat)
let detFile = '—';            // which detector model actually loaded (int8/dynrange/float16/float32)
const $ = id => document.getElementById(id);
$('appVer').textContent = APP_VERSION;
const statusEl = $('status');
const say = msg => { statusEl.textContent = msg; };

// ---- stage sizing: JS fallback for iOS viewport quirks ----
// If the reported layout viewport is shorter than the physical screen (iOS
// standalone home-indicator bug), force the stage to physical screen height.
// On iOS, screen.width/height do NOT rotate: height is always the long side.
function fitStage() {
  const portrait = matchMedia('(orientation: portrait)').matches;
  const target = Math.max(window.innerHeight, portrait ? screen.height : Math.min(screen.width, screen.height));
  const stage = $('stage');
  stage.style.height = target + 'px';
  // diagnostics (visible in Settings)
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;padding-bottom:env(safe-area-inset-bottom,0px);padding-top:env(safe-area-inset-top,0px);visibility:hidden';
  document.body.appendChild(probe);
  const cs = getComputedStyle(probe);
  const saB = cs.paddingBottom, saT = cs.paddingTop;
  probe.remove();
  $('diag').textContent =
    `${APP_VERSION} · viewport ${window.innerWidth}×${window.innerHeight} · screen ${screen.width}×${screen.height}` +
    ` · stage→${target} · safe-top ${saT} · safe-bottom ${saB}` +
    ` · screenY ${window.screenY} · vv ${Math.round(visualViewport?.height ?? -1)}` +
    ` · ${navigator.standalone ? 'standalone app' : 'browser tab'}` +
    ` · isolated ${self.crossOriginIsolated ? 'yes' : 'no'}/${navigator.hardwareConcurrency || '?'} cores · wasm ${rtBuild} · det ${detFile}`;
}
fitStage();
addEventListener('resize', fitStage);
addEventListener('orientationchange', () => setTimeout(fitStage, 300));
visualViewport?.addEventListener('resize', fitStage);
const setDot = (id, cls) => { $(id).className = 'dot' + (cls ? ' ' + cls : ''); };

// ---------------- settings (persisted) ----------------
const SETTINGS_KEY = 'alpr-scanner-settings';
const settings = Object.assign({
  dedupMin: 60, score: 0.35, ocrConf: 0.5, confirm: 2, toastSec: 6,
  zoom: 1, frameEvery: 1, detModel: 'auto',
}, JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'));
function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }

$('setDedupMin').value = settings.dedupMin;
$('setScore').value = settings.score;       $('setScoreVal').textContent = settings.score.toFixed(2);
$('setOcrConf').value = settings.ocrConf;   $('setOcrConfVal').textContent = settings.ocrConf.toFixed(2);
$('setConfirm').value = settings.confirm;
$('setToastSec').value = settings.toastSec;
$('setDedupMin').onchange = e => { settings.dedupMin = Math.max(0, +e.target.value || 0); saveSettings(); };
$('setScore').oninput = e => { settings.score = +e.target.value; $('setScoreVal').textContent = settings.score.toFixed(2); saveSettings(); };
$('setOcrConf').oninput = e => { settings.ocrConf = +e.target.value; $('setOcrConfVal').textContent = settings.ocrConf.toFixed(2); saveSettings(); };
$('setConfirm').onchange = e => { settings.confirm = Math.max(1, +e.target.value || 1); saveSettings(); };
$('setToastSec').onchange = e => { settings.toastSec = Math.max(2, +e.target.value || 6); saveSettings(); };
$('setDetModel').value = settings.detModel;
$('setDetModel').onchange = e => {
  settings.detModel = e.target.value; saveSettings();
  // detector is loaded once on the first Start; force a reload so the new choice
  // applies. If a scan is in progress the change lands on the next Start.
  modelsReady = false;
  say(running ? 'Model change applies after you Stop and Start again.'
              : 'Detector model set — loads on next Start.');
};
$('setZoom').value = settings.zoom; $('setZoomVal').textContent = settings.zoom.toFixed(1) + '×';
$('setFrameEvery').value = settings.frameEvery;
$('setZoom').oninput = e => { setZoom(+e.target.value); };
$('setFrameEvery').onchange = e => { settings.frameEvery = Math.min(5, Math.max(1, +e.target.value || 1)); saveSettings(); };
// central zoom setter shared by the slider and the pinch gesture
function setZoom(z) {
  settings.zoom = Math.min(8, Math.max(1, Math.round(z * 2) / 2));
  $('setZoom').value = settings.zoom;
  $('setZoomVal').textContent = settings.zoom.toFixed(1) + '×';
  saveSettings();
}

for (const sheet of document.querySelectorAll('.sheet')) {
  sheet.querySelector('[data-close]').onclick = () => sheet.classList.remove('open');
}
$('settingsBtn').onclick = () => { $('listSheet').classList.remove('open'); $('settingsSheet').classList.toggle('open'); };
$('listBtn').onclick = async () => { $('settingsSheet').classList.remove('open'); $('listSheet').classList.toggle('open'); if ($('listSheet').classList.contains('open')) renderList(); };

// ---------------- IndexedDB ----------------
// Object stores:
//   'sightings' {id, plate, ts, lat, lon, accuracy, color, locale}
//   'plates'    {plate, note}
//   'images'    blob keyed out-of-line by the sighting id (plate crop JPEG)
//   'meta'      {key, value}  — holds 'schemaVersion' so future builds can migrate/import
//
// DATA_SCHEMA_VERSION is the *logical* schema version stored in 'meta'. It is
// independent of IndexedDB's own db.version (which only gates onupgradeneeded);
// keeping our own number in-band lets a future build detect exactly which shape
// the data is in and run field-level migrations — and lets CSV import know how
// to convert older exports. History:
//   1: sightings{plate,ts,lat,lon,accuracy}
//   2: + color, + 'plates' notes store
//   3: + locale (offline reverse-geocode), + 'images' crop store, + 'meta'
const DATA_SCHEMA_VERSION = 3;
const DB_STORES = ['sightings', 'plates', 'images', 'meta'];

function createStores(db) {
  if (!db.objectStoreNames.contains('sightings')) {
    const store = db.createObjectStore('sightings', { keyPath: 'id', autoIncrement: true });
    store.createIndex('plate', 'plate');
    store.createIndex('ts', 'ts');
  }
  if (!db.objectStoreNames.contains('plates')) db.createObjectStore('plates', { keyPath: 'plate' });
  if (!db.objectStoreNames.contains('images')) db.createObjectStore('images');           // key = sighting id
  if (!db.objectStoreNames.contains('meta')) db.createObjectStore('meta', { keyPath: 'key' });
}
function openDbAt(version) {
  return new Promise((resolve, reject) => {
    const req = version ? indexedDB.open('alpr', version) : indexedDB.open('alpr');
    req.onupgradeneeded = () => createStores(req.result);
    req.onblocked = () => reject(new Error(
      'Database upgrade blocked by another open copy of this app. Fully close other tabs/instances (on iPhone: swipe the app away in the app switcher), then reopen.'));
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('IndexedDB open failed'));
  });
}
async function openDb() {
  // Open at whatever version exists (never blocks), then self-heal missing
  // stores with a version bump only if actually needed. (Versionless open
  // avoids the v1->v2 indefinite-block bug when an old connection is held.)
  let db = await openDbAt();
  if (DB_STORES.some(s => !db.objectStoreNames.contains(s))) {
    const next = db.version + 1;
    db.close();
    db = await openDbAt(next);
  }
  db.onversionchange = () => { try { db.close(); } catch {} };  // never block a future upgrade
  return db;
}
const dbPromise = openDb();
dbPromise.catch(e => say('Database error: ' + (e.message || e)));

function tx(store, mode, fn) {
  return dbPromise.then(db => new Promise((resolve, reject) => {
    const t = db.transaction(store, mode);
    const out = fn(t.objectStore(store));
    // If fn returned an IDBRequest, resolve its .result — even when that result
    // is undefined (a get() miss). The old `out.result ?? out` fallback wrongly
    // returned the request object itself on a miss, making getImage() truthy for
    // sightings with no stored crop.
    t.oncomplete = () => resolve(out instanceof IDBRequest ? out.result : out);
    t.onerror = () => reject(t.error);
  }));
}
const addSighting = s => tx('sightings', 'readwrite', st => st.add(s));   // resolves to new id
const getByPlate = plate => tx('sightings', 'readonly', st => st.index('plate').getAll(plate))
  .then(rows => rows.sort((a, b) => b.ts - a.ts));
const getRecent = (limit = 100) => tx('sightings', 'readonly', st => st.getAll())
  .then(rows => rows.sort((a, b) => b.ts - a.ts).slice(0, limit));
const countAll = () => tx('sightings', 'readonly', st => st.count());
// distinct plate names currently in the DB (light: index KEY scan, no row payloads).
// NOTE: index.getAllKeys() returns the *primary keys* (the sighting ids), NOT the
// index keys (plate strings) — using it here made preDrivePlates a set of numbers
// that never matched the plate strings in drivePlates, so the drive summary always
// reported 0% seen-before. openKeyCursor() yields cursor.key = the index key = plate.
const getPlateSet = () => dbPromise.then(db => new Promise((resolve, reject) => {
  const set = new Set();
  const req = db.transaction('sightings', 'readonly').objectStore('sightings').index('plate').openKeyCursor();
  req.onsuccess = () => { const c = req.result; if (c) { set.add(c.key); c.continue(); } else resolve(set); };
  req.onerror = () => reject(req.error);
}));
const clearAll = () => Promise.all(
  ['sightings', 'plates', 'images'].map(s => tx(s, 'readwrite', st => st.clear())));
const setNote = (plate, note) => tx('plates', 'readwrite',
  st => note ? st.put({ plate, note }) : st.delete(plate));
const getNote = plate => tx('plates', 'readonly', st => st.get(plate)).then(r => r?.note || '');
const getAllNotes = () => tx('plates', 'readonly', st => st.getAll())
  .then(rows => new Map(rows.map(r => [r.plate, r.note])));
const putImage = (id, blob) => tx('images', 'readwrite', st => st.put(blob, id));
const getImage = id => tx('images', 'readonly', st => st.get(id));
const deleteSighting = id => tx('sightings', 'readwrite', st => st.delete(id));
const deleteImage = id => tx('images', 'readwrite', st => st.delete(id));
// re-key a sighting to a different plate, preserving id/ts/gps/color (and its
// crop image, which is keyed by the unchanged id). Used by the merge-misreads tool.
const reKeySighting = (id, plate) => tx('sightings', 'readwrite', st => {
  const g = st.get(id);
  g.onsuccess = () => { const s = g.result; if (s) { s.plate = plate; st.put(s); } };
});
const getMeta = key => tx('meta', 'readonly', st => st.get(key)).then(r => r?.value);
const setMeta = (key, value) => tx('meta', 'readwrite', st => st.put({ key, value }));

// ---- schema-version stamp + migration hook ----
// Runs once at startup. If a stored version is older than DATA_SCHEMA_VERSION,
// convert in place, then stamp the current version. New/empty DBs are stamped
// directly. Field additions (color, locale) need no data rewrite — absent
// fields read as undefined — so v<3 upgrades just re-stamp; the switch is the
// seam where a future breaking migration would live.
async function migrateData() {
  const stored = await getMeta('schemaVersion');
  const from = stored ?? ((await countAll()) > 0 ? 2 : DATA_SCHEMA_VERSION);  // legacy data w/o stamp == v2
  for (let v = from; v < DATA_SCHEMA_VERSION; v++) {
    switch (v) {
      // case N: await ...convert v(N) -> v(N+1)...; break;
      default: break;   // 2->3 is additive-only
    }
  }
  if (stored !== DATA_SCHEMA_VERSION) {
    await setMeta('schemaVersion', DATA_SCHEMA_VERSION);
    await setMeta('appVersion', APP_VERSION);
  }
}
const migrationReady = dbPromise.then(migrateData).catch(e => console.error('migrate', e));

// exposed for debugging / automated tests
window.alprDb = { addSighting, getByPlate, getRecent, countAll, getPlateSet, clearAll,
  setNote, getNote, getAllNotes, putImage, getImage, deleteSighting, deleteImage, reKeySighting,
  getMeta, setMeta, migrationReady };

// ---------------- GPS ----------------
let lastPos = null;   // {lat, lon, accuracy, ts}
function startGps() {
  if (!navigator.geolocation) { setDot('dotGps', 'err'); return; }
  navigator.geolocation.watchPosition(
    p => { lastPos = { lat: p.coords.latitude, lon: p.coords.longitude, accuracy: p.coords.accuracy, ts: Date.now() }; setDot('dotGps', 'ok'); },
    () => setDot('dotGps', 'warn'),
    { enableHighAccuracy: true, maximumAge: 30000, timeout: 15000 });
}
const currentPos = () => (lastPos && Date.now() - lastPos.ts < 5 * 60 * 1000) ? lastPos : null;

// ---------------- offline reverse geocoding ----------------
// Loads a bundled ~30k US-city dataset (geocode-us.json, parallel arrays) and
// resolves a lat/lon to the nearest "City, ST" with a brute-force scan — no
// network. The dataset is fetched once (SW-cached for offline) and lazily; a
// null result (before it loads or if it fails) just falls back to raw coords.
let geo = null, geoLoading = null;
function loadGeo() {
  if (geo) return Promise.resolve(geo);
  if (!geoLoading) geoLoading = fetch('./geocode-us.json')
    .then(r => { if (!r.ok) throw new Error('geocode ' + r.status); return r.json(); })
    .then(d => (geo = d))
    .catch(e => { console.warn('reverse-geocode dataset unavailable:', e.message || e); geoLoading = null; return null; });
  return geoLoading;
}
function reverseGeocodeSync(lat, lon) {
  if (!geo || lat == null || lon == null) return null;
  const { lat: la, lon: lo, names, st, n } = geo;
  const cosLat = Math.cos(lat * Math.PI / 180);
  let best = Infinity, bi = -1;
  for (let i = 0; i < n; i++) {
    const dLa = la[i] - lat, dLo = (lo[i] - lon) * cosLat;
    const dd = dLa * dLa + dLo * dLo;
    if (dd < best) { best = dd; bi = i; }
  }
  return bi < 0 ? null : `${names[bi]}, ${st[bi]}`;
}
// resolve, loading the dataset on demand if it isn't ready yet
async function reverseGeocode(lat, lon) {
  if (lat == null || lon == null) return null;
  if (!geo) await loadGeo();
  return reverseGeocodeSync(lat, lon);
}

// ---------------- toasts ----------------
const fmtDate = ts => new Date(ts).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
const fmtLoc = s => s.locale ? s.locale
  : (s.lat != null) ? `${s.lat.toFixed(5)}, ${s.lon.toFixed(5)}` : 'no location';
// Cap how many individual toasts stack at once so a burst of simultaneously
// scanned plates can't cover the screen. Overflow collapses into a single
// "+N more plates" counter pinned at the bottom of the stack.
const MAX_TOASTS = 4;
let moreEl = null, moreN = 0, moreTimer = null;
function bumpMore(n) {
  const box = $('toasts');
  moreN += n;
  if (!moreEl) { moreEl = document.createElement('div'); moreEl.className = 'toast more'; }
  box.appendChild(moreEl);          // keep the counter last in the stack
  moreEl.textContent = `+${moreN} more plate${moreN > 1 ? 's' : ''} scanned`;
  clearTimeout(moreTimer);
  moreTimer = setTimeout(() => { moreEl?.remove(); moreEl = null; moreN = 0; }, settings.toastSec * 1000);
}
function toast(kind, title, rows) {
  const box = $('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.innerHTML = `<b>${title}</b>` + (rows?.length ? `<div class="rows">${rows.join('<br>')}</div>` : '');
  box.insertBefore(el, moreEl);     // new toasts sit above the aggregate counter
  el._timer = setTimeout(() => { el.classList.add('fadeout'); setTimeout(() => el.remove(), 450); }, settings.toastSec * 1000);
  // collapse the oldest into the counter once we exceed the cap
  let live = [...box.querySelectorAll('.toast:not(.more):not(.fadeout)')];
  while (live.length > MAX_TOASTS) {
    const old = live.shift();
    clearTimeout(old._timer);
    old.remove();
    bumpMore(1);
  }
}

// ---------------- models ----------------
const DET_ALL = {
  int8: './yolox_plates_s_int8.tflite',        // int8 compute, float32 I/O — fastest on wasm CPU
  dynrange: './yolox_plates_s_dynrange.tflite',// weights-only int8, float32 I/O — safe fallback
  float16: './yolox_plates_s_float16.tflite',
  float32: './yolox_plates_s_float32.tflite',
};
const DET_OVERRIDE = new URLSearchParams(location.search).get('det');   // int8|dynrange|float16|float32
const OCR_CANDIDATES = ['./cct_s_v2_global_float16.tflite', './cct_s_v2_global_float32.tflite', './cct_s_ocr_float32.tflite'];
const OCR_ALPHABET = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ_';
let detModel = null, detSpec = null;   // {layout, w, h}
let ocrModel = null, ocrSpec = null;   // {w, h, c, slots}

async function loadRuntime() {
  // LiteRT ships four wasm builds and only loads the threaded (multi-core) one
  // when you pass { threads:true } — cross-origin isolation alone is NOT enough.
  // Pick the fastest the platform allows (threads and jspi are mutually
  // exclusive): where JSPI exists prefer it so the detector can run on WebGPU;
  // otherwise, if the page is cross-origin isolated, use the threaded CPU build
  // (this is the iOS path — no JSPI there, detector is CPU-bound). Each attempt
  // falls back to the next on failure (e.g. no relaxed-SIMD => no threads).
  const isolated = self.crossOriginIsolated === true;
  const override = new URLSearchParams(location.search).get('rt');   // threaded|jspi|default (for testing)
  let attempts;
  if (override === 'threaded') attempts = [['threaded', { threads: true }], ['default', undefined]];
  else if (override === 'jspi') attempts = [['jspi', { jspi: true }], ['default', undefined]];
  else if (override === 'default') attempts = [['default', undefined]];
  else {
    attempts = [];
    if (hasJspi) attempts.push(['jspi', { jspi: true }]);
    if (isolated) attempts.push(['threaded', { threads: true }]);
    attempts.push(['default', undefined]);
  }
  let lastErr;
  for (const [name, opts] of attempts) {
    try { await loadLiteRt(WASM_PATH, opts); rtBuild = name; return; }
    catch (e) { lastErr = e; console.warn(`LiteRT "${name}" build failed, trying next:`, e?.message || e); }
  }
  throw lastErr || new Error('LiteRT failed to load');
}

async function loadModels() {
  say('Loading LiteRT runtime…');
  await loadRuntime();
  say(`Runtime: ${rtBuild} wasm`);
  fitStage();   // refresh the diagnostics line now that rtBuild is known

  say('Loading detector…');
  // WebGPU readback needs JSPI, so it's only valid on the jspi build; every
  // other build (threaded/default/compat) runs the detector on wasm CPU.
  const accels = rtBuild === 'jspi' ? ['webgpu', 'wasm'] : ['wasm'];
  // On the CPU (wasm) path int8 is the fast pick; on WebGPU the float builds
  // run best (the webgpu delegate is unreliable for quantized graphs). The user
  // can override the device-optimal default from Settings (settings.detModel) —
  // e.g. pick float32 for accuracy since the 8-bit model isn't always best. The
  // preferred model is tried first, then the rest as fallback if it won't load.
  const autoOrder = rtBuild === 'jspi'
    ? ['float16', 'float32', 'int8', 'dynrange']
    : ['int8', 'dynrange', 'float16', 'float32'];
  const pref = (DET_OVERRIDE && DET_ALL[DET_OVERRIDE]) ? DET_OVERRIDE
    : (settings.detModel && settings.detModel !== 'auto' && DET_ALL[settings.detModel]) ? settings.detModel : null;
  const order = pref ? [pref, ...autoOrder.filter(k => k !== pref)] : autoOrder;
  const detCands = order.map(k => [k, DET_ALL[k]]);
  outer: for (const [name, cand] of detCands) {
    for (const accel of accels) {
      try { detModel = await loadAndCompile(cand, { accelerator: accel }); detFile = name; break outer; } catch {}
    }
  }
  if (!detModel) throw new Error('No detector model found (yolox_plates_s_*.tflite)');
  const ds = detModel.getInputDetails()[0].shape;
  detSpec = ds[1] === 3 ? { layout: 'nchw', h: ds[2], w: ds[3] } : { layout: 'nhwc', h: ds[1], w: ds[2] };

  say('Loading OCR…');
  for (const cand of OCR_CANDIDATES) {
    try { ocrModel = await loadAndCompile(cand, { accelerator: 'wasm' }); break; } catch {}
  }
  if (!ocrModel) throw new Error('No OCR model found (cct_*.tflite)');
  const oi = ocrModel.getInputDetails()[0];
  const plateOut = ocrModel.getOutputDetails().find(o => o.shape[o.shape.length - 1] === OCR_ALPHABET.length);
  ocrSpec = { h: oi.shape[1], w: oi.shape[2], c: oi.shape[3], slots: plateOut.shape[1] };
  setDot('dotModel', 'ok');
}

// ---------------- detection (same decode as alpr-demo.html) ----------------
const detCanvas = document.createElement('canvas');
let grids = null;
function buildGrids() {
  grids = [];
  for (const s of [8, 16, 32]) {
    const gw = detSpec.w / s, gh = detSpec.h / s;
    for (let gy = 0; gy < gh; gy++) for (let gx = 0; gx < gw; gx++) grids.push([gx, gy, s]);
  }
}

async function detect(frameCanvas) {
  const { w: W, h: H, layout } = detSpec;
  if (!grids) buildGrids();
  detCanvas.width = W; detCanvas.height = H;
  const ctx = detCanvas.getContext('2d', { willReadFrequently: true });
  const r = Math.min(W / frameCanvas.width, H / frameCanvas.height);
  ctx.fillStyle = 'rgb(114,114,114)';
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(frameCanvas, 0, 0, Math.round(frameCanvas.width * r), Math.round(frameCanvas.height * r));
  const { data: px } = ctx.getImageData(0, 0, W, H);
  const n = W * H;
  const inp = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    if (layout === 'nchw') { inp[i] = px[i * 4]; inp[n + i] = px[i * 4 + 1]; inp[2 * n + i] = px[i * 4 + 2]; }
    else { inp[i * 3] = px[i * 4]; inp[i * 3 + 1] = px[i * 4 + 1]; inp[i * 3 + 2] = px[i * 4 + 2]; }
  }
  const t = new Tensor(inp, layout === 'nchw' ? [1, 3, H, W] : [1, H, W, 3]);
  const outs = await detModel.run(t);
  const list = Array.isArray(outs) ? outs : Object.values(outs);
  const cpu = await list[0].moveTo('wasm');
  const y = cpu.toTypedArray();          // [8400, 6]
  try { t.delete(); } catch {}
  list.forEach(x => { try { x.delete(); } catch {} });

  const cands = [];
  const N = grids.length;
  for (let i = 0; i < N; i++) {
    const score = y[i * 6 + 4] * y[i * 6 + 5];
    if (score < settings.score) continue;
    const [gx, gy, s] = grids[i];
    const cx = (y[i * 6] + gx) * s, cy = (y[i * 6 + 1] + gy) * s;
    const w = Math.exp(y[i * 6 + 2]) * s, h = Math.exp(y[i * 6 + 3]) * s;
    cands.push({ score, x1: (cx - w / 2) / r, y1: (cy - h / 2) / r, x2: (cx + w / 2) / r, y2: (cy + h / 2) / r });
  }
  cands.sort((a, b) => b.score - a.score);
  const keep = [];
  for (const b of cands) {
    let ok = true;
    for (const k of keep) {
      const ix = Math.max(0, Math.min(b.x2, k.x2) - Math.max(b.x1, k.x1));
      const iy = Math.max(0, Math.min(b.y2, k.y2) - Math.max(b.y1, k.y1));
      const inter = ix * iy;
      const uni = (b.x2 - b.x1) * (b.y2 - b.y1) + (k.x2 - k.x1) * (k.y2 - k.y1) - inter;
      if (inter / (uni + 1e-9) > 0.45) { ok = false; break; }
    }
    if (ok) keep.push(b);
    if (keep.length >= 4) break;      // at most 4 plates per frame
  }
  return keep;
}

// ---------------- OCR (same as alpr-demo.html, generic) ----------------
const ocrCanvas = document.createElement('canvas');
async function runOcr(frameCanvas, d) {
  const { w: W, h: H, c: C, slots } = ocrSpec;
  ocrCanvas.width = W; ocrCanvas.height = H;
  const mw = (d.x2 - d.x1) * 0.1, mh = (d.y2 - d.y1) * 0.1;
  const cx1 = Math.max(0, d.x1 - mw), cy1 = Math.max(0, d.y1 - mh);
  const cx2 = Math.min(frameCanvas.width, d.x2 + mw), cy2 = Math.min(frameCanvas.height, d.y2 + mh);
  const ctx = ocrCanvas.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(frameCanvas, cx1, cy1, cx2 - cx1, cy2 - cy1, 0, 0, W, H);
  const { data: px } = ctx.getImageData(0, 0, W, H);
  const inp = new Float32Array(W * H * C);
  for (let i = 0; i < W * H; i++) {
    if (C === 1) inp[i] = 0.299 * px[i * 4] + 0.587 * px[i * 4 + 1] + 0.114 * px[i * 4 + 2];
    else { inp[i * 3] = px[i * 4]; inp[i * 3 + 1] = px[i * 4 + 1]; inp[i * 3 + 2] = px[i * 4 + 2]; }
  }
  const t = new Tensor(inp, [1, H, W, C]);
  const outs = await ocrModel.run(t);
  const list = Array.isArray(outs) ? outs : Object.values(outs);
  let probs = null;
  for (const out of list) {
    const cpu = await out.moveTo('wasm');
    const arr = cpu.toTypedArray();
    if (arr.length === slots * OCR_ALPHABET.length) probs = arr;
  }
  try { t.delete(); } catch {}
  list.forEach(x => { try { x.delete(); } catch {} });
  if (!probs) return { text: '', conf: 0 };
  let text = '';
  const confs = [];
  for (let s = 0; s < slots; s++) {
    let bi = 0, bv = -Infinity;
    for (let c = 0; c < OCR_ALPHABET.length; c++) {
      const v = probs[s * OCR_ALPHABET.length + c];
      if (v > bv) { bv = v; bi = c; }
    }
    if (OCR_ALPHABET[bi] !== '_') { text += OCR_ALPHABET[bi]; confs.push(bv); }
  }
  return { text, conf: confs.length ? Math.min(...confs) : 0 };
}

// ---------------- car color estimate ----------------
// Samples four body-panel bands around the plate (above/below/left/right),
// applies gray-world white balance estimated from the FULL frame (kills the
// blue cast of shade/sky-lit scenes), and requires substantial absolute
// chroma before calling a hue — otherwise classifies by median brightness.
// Constants tuned against the test_images set (scratchpad eval_color.py).
const colorCanvas = document.createElement('canvas');
const wbCanvas = document.createElement('canvas');
const HUE_LIMITS = [[15, 'red'], [45, 'orange'], [70, 'yellow'], [170, 'green'], [260, 'blue'], [345, 'purple'], [361, 'red']];

function wbGains(frameCanvas) {
  wbCanvas.width = 32; wbCanvas.height = 32;
  const ctx = wbCanvas.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(frameCanvas, 0, 0, 32, 32);
  const { data: px } = ctx.getImageData(0, 0, 32, 32);
  let r = 0, g = 0, b = 0;
  for (let i = 0; i < 1024; i++) { r += px[i * 4]; g += px[i * 4 + 1]; b += px[i * 4 + 2]; }
  r /= 1024; g /= 1024; b /= 1024;
  const gray = (r + g + b) / 3;
  const clamp = x => Math.min(1.5, Math.max(0.7, gray / (x + 1e-6)));
  return [clamp(r), clamp(g), clamp(b)];
}

function estimateCarColor(frameCanvas, d) {
  const pw = d.x2 - d.x1, ph = d.y2 - d.y1;
  const gains = wbGains(frameCanvas);
  const bands = [
    [d.x1 - pw * 0.15, d.y1 - ph * 2.0, d.x2 + pw * 0.15, d.y1 - ph * 0.4],   // body above plate
    [d.x1 - pw * 0.15, d.y2 + ph * 0.3, d.x2 + pw * 0.15, d.y2 + ph * 1.5],   // bumper below
    [d.x1 - pw * 0.85, d.y1 - ph * 0.5, d.x1 - pw * 0.10, d.y2 + ph * 0.5],   // body left
    [d.x2 + pw * 0.10, d.y1 - ph * 0.5, d.x2 + pw * 0.85, d.y2 + ph * 0.5],   // body right
  ];
  colorCanvas.width = 32; colorCanvas.height = 12;
  const ctx = colorCanvas.getContext('2d', { willReadFrequently: true });
  const hueW = {}, hueN = {};
  const achro = [];
  for (const [bx1, by1, bx2, by2] of bands) {
    const x1 = Math.max(0, bx1), y1 = Math.max(0, by1);
    const x2 = Math.min(frameCanvas.width, bx2), y2 = Math.min(frameCanvas.height, by2);
    if (x2 - x1 < 8 || y2 - y1 < 4) continue;
    ctx.drawImage(frameCanvas, x1, y1, x2 - x1, y2 - y1, 0, 0, 32, 12);
    const { data: px } = ctx.getImageData(0, 0, 32, 12);
    for (let i = 0; i < 32 * 12; i++) {
      const r = Math.min(255, px[i * 4] * gains[0]);
      const g = Math.min(255, px[i * 4 + 1] * gains[1]);
      const b = Math.min(255, px[i * 4 + 2] * gains[2]);
      const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
      const v = mx / 255, chroma = mx - mn, s = mx ? chroma / mx : 0;
      if (v > 0.96 && chroma < 40) continue;              // specular highlight
      if (chroma < 34 || s < 0.25) { achro.push(v); continue; }
      let h = mx === r ? ((g - b) / chroma) % 6 : mx === g ? (b - r) / chroma + 2 : (r - g) / chroma + 4;
      h *= 60; if (h < 0) h += 360;
      const name = HUE_LIMITS.find(([lim]) => h < lim)[1];
      hueW[name] = (hueW[name] || 0) + 1 + chroma / 64;   // weight vivid pixels more
      hueN[name] = (hueN[name] || 0) + 1;
    }
  }
  const colored = Object.values(hueN).reduce((a, x) => a + x, 0);
  const total = colored + achro.length;
  if (!total) return null;
  if (colored >= 0.30 * total) {
    return Object.entries(hueW).sort((a, b) => b[1] - a[1])[0][0];
  }
  achro.sort((a, b) => a - b);
  const vm = achro[achro.length >> 1];
  return vm < 0.32 ? 'black' : vm < 0.58 ? 'gray' : vm < 0.82 ? 'silver' : 'white';
}

// ---------------- plate crop snapshot ----------------
// Draws the detected plate box (+10% margin) into a fresh canvas *synchronously*
// so the pixels are captured before the shared frameCanvas is reused next frame.
// A new canvas per call avoids a race if two plates are logged from one frame.
function snapshotCrop(frameCanvas, d) {
  const mw = (d.x2 - d.x1) * 0.1, mh = (d.y2 - d.y1) * 0.1;
  const x1 = Math.max(0, d.x1 - mw), y1 = Math.max(0, d.y1 - mh);
  const x2 = Math.min(frameCanvas.width, d.x2 + mw), y2 = Math.min(frameCanvas.height, d.y2 + mh);
  const sw = Math.max(1, Math.round(x2 - x1)), sh = Math.max(1, Math.round(y2 - y1));
  // cap the longer side to 480px — plenty for a plate crop, keeps blobs small
  const scale = Math.min(1, 480 / Math.max(sw, sh));
  const c = document.createElement('canvas');
  c.width = Math.max(1, Math.round(sw * scale));
  c.height = Math.max(1, Math.round(sh * scale));
  c.getContext('2d').drawImage(frameCanvas, x1, y1, x2 - x1, y2 - y1, 0, 0, c.width, c.height);
  return c;
}
const cropToBlob = canvas => new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.72));

// ---------------- sighting logic ----------------
const confirmCounts = new Map();    // plate -> consecutive confirmations
const recentToast = new Map();      // plate -> last toast ts (anti-spam)
const recentLogged = new Map();     // plate -> last handled ts (in-memory fast path)

async function handleConfirmedPlate(plate, color, cropCanvas) {
  const now = Date.now();
  // in-memory throttle so we don't hammer the DB every frame for the plate in view
  if (now - (recentLogged.get(plate) || 0) < 10_000) return;
  recentLogged.set(plate, now);

  drivePlates.add(plate);           // distinct plates seen on this drive (feature 1)

  const prior = await getByPlate(plate);
  const note = await getNote(plate);
  const dedupMs = settings.dedupMin * 60 * 1000;
  const isDup = prior.length > 0 && (now - prior[0].ts) < dedupMs;

  let locale = null, newId = null;
  if (!isDup) {
    const pos = currentPos();
    locale = pos ? await reverseGeocode(pos.lat, pos.lon) : null;
    newId = await addSighting({ plate, ts: now, lat: pos?.lat ?? null, lon: pos?.lon ?? null,
                        accuracy: pos?.accuracy ?? null, color: color ?? null, locale });
  }

  // Surface the toast as soon as the row is logged — don't make the user wait
  // on JPEG encoding/storage below.
  // Toasts are kept compact: the amber (seen) / green (new) left border already
  // signals which is which, so the wording stays minimal. A single prior sighting
  // needs no "seen 1× before" caption — only show a count once it's ≥ 2.
  const title = note ? `${plate} — ${note}` : plate;
  if (prior.length > 0) {
    if (now - (recentToast.get(plate) || 0) > 30_000) {
      recentToast.set(plate, now);
      toast('seen', prior.length >= 2 ? `${title} · seen ${prior.length}×` : title, []);
    }
  } else {
    const detail = [color, locale].filter(Boolean).join(' · ');
    toast('new', title, detail ? [detail] : []);
  }

  // store the plate crop after user feedback (feature 3)
  if (newId != null && cropCanvas) {
    try { const blob = await cropToBlob(cropCanvas); if (blob) await putImage(newId, blob); }
    catch (e) { console.warn('image store failed', e); }
  }
}

// ---------------- camera + scan loop ----------------
const video = $('video');
const overlay = $('overlay');
const frameCanvas = document.createElement('canvas');
let running = false, stream = null, wakeLock = null;
let frameCount = 0, lastDets = [];
// geometry of the current center-crop (digital zoom). At zoom 1 this is the
// whole frame; boxes from detect()/runOcr() are in crop-space and get offset
// by cx0/cy0 back to full-video space for the overlay.
let lastCrop = { cx0: 0, cy0: 0, cropW: 0, cropH: 0, vW: 0, vH: 0 };

// ---- drive session (feature 1: stop summary) ----
let driveStartTs = 0;

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
    audio: false,
  });
  video.srcObject = stream;
  await video.play();
  setDot('dotCam', 'ok');
  try { wakeLock = await navigator.wakeLock?.request('screen'); } catch {}
}
function stopCamera() {
  stream?.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  wakeLock?.release().catch(() => {});
  setDot('dotCam', '');
}

function drawOverlay(dets) {
  const lc = lastCrop;
  overlay.width = lc.vW || video.videoWidth; overlay.height = lc.vH || video.videoHeight;
  const ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  const ox = lc.cx0 || 0, oy = lc.cy0 || 0;
  // when zoomed, show the scanned region so the user knows what's in view
  if (settings.zoom > 1 && lc.cropW) {
    ctx.strokeStyle = '#ffffff66'; ctx.lineWidth = Math.max(2, overlay.width / 500);
    ctx.setLineDash([14, 10]); ctx.strokeRect(ox, oy, lc.cropW, lc.cropH); ctx.setLineDash([]);
  }
  ctx.font = `${Math.max(18, overlay.width / 40)}px system-ui`;
  ctx.textBaseline = 'bottom';
  ctx.lineWidth = Math.max(2, overlay.width / 400);
  for (const d of dets) {
    const good = d.text && d.conf >= settings.ocrConf;
    ctx.strokeStyle = good ? '#3ddc84' : '#ffb347';
    ctx.strokeRect(ox + d.x1, oy + d.y1, d.x2 - d.x1, d.y2 - d.y1);
    if (d.text) {
      const label = `${d.text} ${(d.conf * 100).toFixed(0)}%`;
      const tw = ctx.measureText(label).width;
      ctx.fillStyle = good ? '#3ddc84' : '#ffb347';
      ctx.fillRect(ox + d.x1, oy + d.y1 - parseInt(ctx.font) - 4, tw + 10, parseInt(ctx.font) + 4);
      ctx.fillStyle = '#06213c';
      ctx.fillText(label, ox + d.x1 + 5, oy + d.y1 - 2);
    }
  }
}

async function scanLoop() {
  while (running) {
    if (video.readyState < 2 || document.hidden) { await new Promise(r => setTimeout(r, 200)); continue; }

    // center-crop for digital zoom (Z=1 => whole frame, i.e. unchanged)
    const vW = video.videoWidth, vH = video.videoHeight;
    const Z = Math.max(1, settings.zoom || 1);
    const cropW = Math.max(16, Math.round(vW / Z)), cropH = Math.max(16, Math.round(vH / Z));
    const cx0 = Math.round((vW - cropW) / 2), cy0 = Math.round((vH - cropH) / 2);
    lastCrop = { cx0, cy0, cropW, cropH, vW, vH };

    // frame-skip: run the (expensive) detector only every Nth camera frame;
    // between runs keep the last boxes on the overlay. Cuts sustained CPU
    // load/heat, which on a thermally-throttling phone can raise the effective
    // frame rate of the frames that DO run.
    if ((frameCount++ % Math.max(1, settings.frameEvery | 0)) !== 0) {
      drawOverlay(lastDets);
      await new Promise(r => setTimeout(r, 0));
      continue;
    }

    const t0 = performance.now();
    frameCanvas.width = cropW; frameCanvas.height = cropH;
    frameCanvas.getContext('2d', { willReadFrequently: true })
      .drawImage(video, cx0, cy0, cropW, cropH, 0, 0, cropW, cropH);

    let dets = [];
    try { dets = await detect(frameCanvas); } catch (e) { say('Detector error: ' + (e.message || e)); }
    const seenThisFrame = new Set();
    for (const d of dets) {
      try {
        const r = await runOcr(frameCanvas, d);
        d.text = r.text; d.conf = r.conf;
        if (r.text.length >= 4 && r.text.length <= 10 && r.conf >= settings.ocrConf) {
          seenThisFrame.add(r.text);
          const c = (confirmCounts.get(r.text) || 0) + 1;
          confirmCounts.set(r.text, c);
          if (c >= settings.confirm) {
            // capture color + crop synchronously (frameCanvas is reused next frame)
            handleConfirmedPlate(r.text, estimateCarColor(frameCanvas, d), snapshotCrop(frameCanvas, d))
              .catch(console.error);
          }
        }
      } catch (e) { say('OCR error: ' + (e.message || e)); }
    }
    for (const key of confirmCounts.keys()) if (!seenThisFrame.has(key)) confirmCounts.delete(key);

    lastDets = dets;
    drawOverlay(dets);
    const ms = performance.now() - t0;
    $('perf').textContent = `${ms.toFixed(0)} ms/frame${Z > 1 ? ` · ${Z}×` : ''}`;
    await new Promise(r => setTimeout(r, 0));   // yield to UI
  }
  lastDets = [];
  drawOverlay([]);
}

// ---------------- prune / merge misread plates ----------------
// OCR occasionally misreads a plate by a character or two (O↔0, I↔1, dropped
// char). Those misreads show up as their own plate with very few sightings,
// sitting one edit away from the real plate that has many sightings. This tool
// finds such pairs and merges the misread's sightings into the correct plate.
//
// Levenshtein distance (small strings, plain DP — plates are ≤10 chars).
function editDistance(a, b) {
  const m = a.length, n = b.length;
  if (Math.abs(m - n) > 1) return 2;            // we only ever care about ≤1
  let prev = Array.from({ length: n + 1 }, (_, j) => j);
  for (let i = 1; i <= m; i++) {
    const cur = [i];
    for (let j = 1; j <= n; j++) {
      cur[j] = a[i - 1] === b[j - 1] ? prev[j - 1]
        : 1 + Math.min(prev[j], cur[j - 1], prev[j - 1]);
    }
    prev = cur;
  }
  return prev[n];
}

// Build the list of proposed merges. A plate is treated as a misread (the
// "source") when a plate one edit away has strictly more sightings and the
// source itself is a small minority read — this keeps two legitimately similar
// plates (e.g. ABC123 vs ABC124, both seen many times) from being merged.
// many→one is allowed (several misreads of the same plate); chains are not.
async function computeMerges() {
  const rows = await getRecent(1e9);
  const byPlate = new Map();
  for (const s of rows) { if (!byPlate.has(s.plate)) byPlate.set(s.plate, []); byPlate.get(s.plate).push(s); }
  const count = p => byPlate.get(p).length;
  const plates = [...byPlate.keys()].sort((a, b) => count(a) - count(b));   // small (likely misreads) first
  const dedupMs = settings.dedupMin * 60 * 1000;
  const sources = new Set(), targets = new Set();
  const merges = [];
  for (const p of plates) {
    if (sources.has(p) || targets.has(p)) continue;
    let best = null;
    for (const q of plates) {
      if (q === p || sources.has(q)) continue;                 // a source can't also be a target
      if (count(q) <= count(p)) continue;                      // target must be more-seen
      if (editDistance(p, q) !== 1) continue;
      if (!best || count(q) > count(best)) best = q;
    }
    if (!best) continue;
    // only merge if the source is a clear minority (a misread), not a rival real plate
    if (count(p) > Math.max(2, Math.floor(count(best) / 2))) continue;
    // how many of the source rows would actually move vs. be dropped as
    // duplicates already covered by the target within the dedup window.
    const tTimes = byPlate.get(best).map(s => s.ts);
    let dropped = 0;
    for (const s of byPlate.get(p)) if (tTimes.some(t => Math.abs(t - s.ts) < dedupMs)) dropped++;
    merges.push({ from: p, to: best, fromN: count(p), toN: count(best),
                  moved: count(p) - dropped, dropped });
    sources.add(p); targets.add(best);
  }
  return merges;
}

// Apply a single merge: re-key each source sighting to the correct plate,
// EXCEPT rows falling inside the dedup window of an existing target sighting —
// those are redundant repeat-sightings of the same event and are deleted
// (matching the "ignore repeat sightings within N minutes" rule). Notes follow
// the plate if the target has none.
async function applyMerge(m) {
  const dedupMs = settings.dedupMin * 60 * 1000;
  const [fromRows, toRows] = [await getByPlate(m.from), await getByPlate(m.to)];
  const tTimes = toRows.map(s => s.ts);
  for (const s of fromRows) {
    if (tTimes.some(t => Math.abs(t - s.ts) < dedupMs)) {
      await deleteSighting(s.id); await deleteImage(s.id);     // duplicate within window → drop
    } else {
      await reKeySighting(s.id, m.to); tTimes.push(s.ts);      // move to correct plate (keeps crop)
    }
  }
  const [fromNote, toNote] = [await getNote(m.from), await getNote(m.to)];
  if (fromNote && !toNote) await setNote(m.to, fromNote);
  await setNote(m.from, '');                                   // clear the misread's note
}

const csvField = v => {
  const s = String(v ?? '');

};
function parseCsvLine(line) {
  const out = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"') { if (line[i + 1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    }
    else if (ch === '"') inQ = true;
    else if (ch === ',') { out.push(cur); cur = ''; }
    else cur += ch;
  }
  out.push(cur);
  return out;
}

// Build the sightings CSV text. `imageNameFor` (optional) returns the in-bundle
// image path for a row, adding an `image` column — used only by the ZIP export.
function buildCsv(rows, notes, imageNameFor) {
  // Leading '#' line stamps the schema so a future build knows how to convert
  // this file on import. The parser skips '#' lines, so it stays backward-
  // compatible with readers that only look at the column header.
  const marker = `# alpr-export schema=${DATA_SCHEMA_VERSION} app=${APP_VERSION}\n`;
  const header = 'plate,timestamp,iso_date,lat,lon,accuracy_m,color,locale,note' +
    (imageNameFor ? ',image' : '') + '\n';
  const body = rows.map(s => {
    const cols = [s.plate, s.ts, new Date(s.ts).toISOString(), s.lat ?? '', s.lon ?? '',
      s.accuracy != null ? s.accuracy.toFixed(0) : '', s.color ?? '', s.locale ?? '', notes.get(s.plate) ?? ''];
    if (imageNameFor) cols.push(imageNameFor(s) || '');
    return cols.map(csvField).join(',');
  }).join('\n');
  return marker + header + body;
}

// ---------------- ZIP archive (data + plate photos) ----------------
// A portable bundle that any OS opens natively: sightings.csv (opens in Excel/
// Sheets/LibreOffice) + an images/<id>.jpg folder + a README. Written with the
// STORE method (no compression — JPEGs are already compressed and the CSV is
// tiny) in pure JS so the offline/CSP-locked app needs no zip dependency. The
// READER additionally handles DEFLATE (method 8) via DecompressionStream, so a
// bundle the user edits and re-zips with Windows Explorer / macOS Finder (both
// compress) still imports.
const crcTable = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[n] = c >>> 0; }
  return t;
})();
function crc32(u8) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < u8.length; i++) c = crcTable[(c ^ u8[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function zipStore(entries) {            // entries: [{name, data: Uint8Array}]
  const enc = new TextEncoder();
  const now = new Date();
  const dosTime = ((now.getHours() << 11) | (now.getMinutes() << 5) | (now.getSeconds() >> 1)) & 0xFFFF;
  const dosDate = (((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate()) & 0xFFFF;
  const parts = [], central = [];
  let offset = 0;
  for (const e of entries) {
    const name = enc.encode(e.name), data = e.data, crc = crc32(data);
    const lh = new DataView(new ArrayBuffer(30));
    lh.setUint32(0, 0x04034b50, true); lh.setUint16(4, 20, true); lh.setUint16(6, 0x0800, true);  // UTF-8 name flag
    lh.setUint16(8, 0, true); lh.setUint16(10, dosTime, true); lh.setUint16(12, dosDate, true);
    lh.setUint32(14, crc, true); lh.setUint32(18, data.length, true); lh.setUint32(22, data.length, true);
    lh.setUint16(26, name.length, true); lh.setUint16(28, 0, true);
    parts.push(new Uint8Array(lh.buffer), name, data);
    const ch = new DataView(new ArrayBuffer(46));
    ch.setUint32(0, 0x02014b50, true); ch.setUint16(4, 20, true); ch.setUint16(6, 20, true); ch.setUint16(8, 0x0800, true);
    ch.setUint16(10, 0, true); ch.setUint16(12, dosTime, true); ch.setUint16(14, dosDate, true);
    ch.setUint32(16, crc, true); ch.setUint32(20, data.length, true); ch.setUint32(24, data.length, true);
    ch.setUint16(28, name.length, true); ch.setUint32(42, offset, true);
    central.push(new Uint8Array(ch.buffer), name);
    offset += 30 + name.length + data.length;
  }
  const cdSize = central.reduce((a, x) => a + x.length, 0);
  const eocd = new DataView(new ArrayBuffer(22));
  eocd.setUint32(0, 0x06054b50, true);
  eocd.setUint16(8, entries.length, true); eocd.setUint16(10, entries.length, true);
  eocd.setUint32(12, cdSize, true); eocd.setUint32(16, offset, true);
  return new Blob([...parts, ...central, new Uint8Array(eocd.buffer)], { type: 'application/zip' });
}
async function inflateRaw(u8) {
  if (typeof DecompressionStream === 'undefined')
    throw new Error('this browser can\'t read compressed zips — re-export or import the CSV directly');
  const stream = new Blob([u8]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function unzip(arrayBuffer) {      // -> { name: Uint8Array }
  const u8 = new Uint8Array(arrayBuffer), dv = new DataView(arrayBuffer), dec = new TextDecoder();
  let eo = -1;
  for (let i = u8.length - 22; i >= Math.max(0, u8.length - 22 - 65536); i--) {
    if (dv.getUint32(i, true) === 0x06054b50) { eo = i; break; }
  }
  if (eo < 0) throw new Error('not a valid zip file');
  const count = dv.getUint16(eo + 10, true);
  let p = dv.getUint32(eo + 16, true);
  const out = {}, jobs = [];
  for (let i = 0; i < count && dv.getUint32(p, true) === 0x02014b50; i++) {
    const method = dv.getUint16(p + 10, true), compSize = dv.getUint32(p + 20, true);
    const nameLen = dv.getUint16(p + 28, true), extraLen = dv.getUint16(p + 30, true), commentLen = dv.getUint16(p + 32, true);
    const lho = dv.getUint32(p + 42, true);
    const name = dec.decode(u8.subarray(p + 46, p + 46 + nameLen));
    const dataStart = lho + 30 + dv.getUint16(lho + 26, true) + dv.getUint16(lho + 28, true);
    const comp = u8.subarray(dataStart, dataStart + compSize);
    if (method === 0) out[name] = comp;
    else if (method === 8) jobs.push(inflateRaw(comp).then(d => { out[name] = d; }));
    else throw new Error('unsupported zip compression (method ' + method + ')');
    p += 46 + nameLen + extraLen + commentLen;
  }
  await Promise.all(jobs);
  return out;
}

const ZIP_README =
  'Plate Scanner export bundle\n' +
  '===========================\n\n' +
  'sightings.csv  - one row per sighting (opens in Excel / Google Sheets / LibreOffice).\n' +
  'images/        - plate crop photos, named <id>.jpg and referenced by the CSV "image" column.\n\n' +
  'You can edit sightings.csv (add notes, fix a plate, delete rows) and re-import\n' +
  'this bundle into the app; rows are matched by plate+timestamp so re-importing\n' +
  'only adds what is missing. Re-zipping with your OS is fine (compression is handled).\n';

$('exportZipBtn').onclick = async () => {
  const btn = $('exportZipBtn'), prev = btn.textContent;
  btn.disabled = true; btn.textContent = 'Building…';
  try {
    const [rows, notes] = await Promise.all([getRecent(1000000), getAllNotes()]);
    const entries = [];
    const haveImage = new Set();
    for (const s of rows) {
      const blob = await getImage(s.id).catch(() => null);
      if (blob) { entries.push({ name: `images/${s.id}.jpg`, data: new Uint8Array(await blob.arrayBuffer()) }); haveImage.add(s.id); }
    }
    const csv = buildCsv(rows, notes, s => haveImage.has(s.id) ? `images/${s.id}.jpg` : '');
    entries.unshift({ name: 'sightings.csv', data: new TextEncoder().encode(csv) });
    entries.push({ name: 'README.txt', data: new TextEncoder().encode(ZIP_README) });
    download(zipStore(entries), `plates-${stamp()}.zip`);
  } catch (e) {
    toast('seen', 'ZIP export failed: ' + (e.message || e), []);
  } finally {
    btn.disabled = false; btn.textContent = prev;
  }
};

// ---------------- import (CSV or ZIP) ----------------
// Shared row importer. `getImageBlob(name)` (optional) resolves a bundle image
// path to a Blob; when present, rows carrying an `image` column get their crop
// restored under the freshly-assigned sighting id.
async function importCsv(text, getImageBlob) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#'));
  if (!lines.length) throw new Error('empty file');
  const header = parseCsvLine(lines[0]).map(h => h.trim().toLowerCase());
  const col = name => header.indexOf(name);
  if (col('plate') < 0) throw new Error('no "plate" column in header');

  const existing = new Set((await getRecent(1000000)).map(s => `${s.plate}|${s.ts}`));
  const localNotes = await getAllNotes();
  let added = 0, skipped = 0, bad = 0, notesAdded = 0, imagesAdded = 0;
  for (const line of lines.slice(1)) {
    const f = parseCsvLine(line);
    const get = name => { const i = col(name); return i >= 0 ? f[i]?.trim() : ''; };
    const plate = get('plate').toUpperCase();
    const ts = parseInt(get('timestamp'), 10) || Date.parse(get('iso_date'));
    if (!plate || !Number.isFinite(ts)) { bad++; continue; }
    if (existing.has(`${plate}|${ts}`)) { skipped++; continue; }
    existing.add(`${plate}|${ts}`);
    const lat = parseFloat(get('lat')) || null, lon = parseFloat(get('lon')) || null;
    // older exports (schema<3) have no locale column — derive it offline so
    // imported rows show a friendly place too.
    let locale = get('locale') || null;
    if (!locale && lat != null && lon != null) locale = await reverseGeocode(lat, lon);
    const newId = await addSighting({
      plate, ts, lat, lon,
      accuracy: parseFloat(get('accuracy_m')) || null, color: get('color') || null, locale,
    });
    added++;
    const note = get('note');
    if (note && !localNotes.get(plate)) { await setNote(plate, note); localNotes.set(plate, note); notesAdded++; }
    const imgName = get('image');
    if (getImageBlob && imgName) {
      try { const blob = await getImageBlob(imgName); if (blob) { await putImage(newId, blob); imagesAdded++; } }
      catch (e) { console.warn('image import failed', imgName, e); }
    }
  }
  return { added, skipped, bad, notesAdded, imagesAdded };
}

$('importBtn').onclick = () => $('importFile').click();
$('importFile').onchange = async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  try {
    let text, resolver = null;
    if (/\.zip$/i.test(file.name) || file.type === 'application/zip') {
      const files = await unzip(await file.arrayBuffer());
      const csvName = Object.keys(files).find(n => /(^|\/)sightings\.csv$/i.test(n))
        || Object.keys(files).find(n => /\.csv$/i.test(n));
      if (!csvName) throw new Error('no sightings.csv inside the zip');
      text = new TextDecoder().decode(files[csvName]);
      resolver = name => { const u8 = files[name] || files[name.replace(/^\.?\//, '')]; return u8 ? new Blob([u8], { type: 'image/jpeg' }) : null; };
    } else {
      text = await file.text();
    }
    const r = await importCsv(text, resolver);
    toast('new', `Import: ${r.added} added, ${r.skipped} duplicates skipped` +
      (r.notesAdded ? `, ${r.notesAdded} notes` : '') + (r.imagesAdded ? `, ${r.imagesAdded} photos` : '') +
      (r.bad ? `, ${r.bad} bad rows` : ''), []);
    renderList();
  } catch (err) {
    toast('seen', 'Import failed: ' + (err.message || err), []);
  }
};

$('clearBtn').onclick = async () => {

// ---------------- service worker ----------------
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  navigator.serviceWorker.register('./sw.js').then(() => {
    // Cross-origin isolation (needed for threaded wasm) can fail on the FIRST
    // load when the page isn't yet under the SW's control — the SW injects the
    // COOP/COEP headers, but only for requests it handles. If we're not isolated
    // yet, reload ONCE as soon as a controller exists so the isolated headers
    // apply. sessionStorage guards against a reload loop (if it still can't
    // isolate — e.g. an OS that won't honor it — we stop and run single-threaded).
    if (self.crossOriginIsolated) { sessionStorage.removeItem('coiReload'); return; }
    if (sessionStorage.getItem('coiReload')) return;   // already tried once this session
    const reloadOnce = () => {
      if (!navigator.serviceWorker.controller) return;
      sessionStorage.setItem('coiReload', '1');
      location.reload();
    };
    if (navigator.serviceWorker.controller) reloadOnce();
    else navigator.serviceWorker.addEventListener('controllerchange', reloadOnce, { once: true });
  }).catch(() => {});
}

// ---------------- startup 3D voxel-logo splash ----------------
// The app logo (a license plate reading "ABC 123" inside viewfinder corners) is
// built directly on a coarse cell grid — the plate is filled cells, the text is
// carved out as holes with a 3×5 bitmap font (a rasterised system font is
// illegible at this pixel size), the corners are drawn as brackets. Each lit
// cell becomes a small cube. The whole slab precesses (a slow circular tilt)
// so the 3D form is unmistakable, and each face is shaded with an angle- and
// position-dependent iridescent ("oil slick") colour that drifts as it turns.
// Everything is Canvas-2D + a tiny painter's-algorithm voxel renderer
// (no WebGL/library) so it stays self-contained for the offline PWA.
const splashEl = $('splash'), splashCanvas = $('splashCanvas');
const sctx = splashCanvas?.getContext('2d');
// 8 cube corners, indexed by bits: bit0=+x, bit1=+y, bit2=+z
const CUBE_FACES = [
  { idx: [4, 5, 7, 6], n: [0, 0, 1] },   // +z (top toward camera)
  { idx: [0, 1, 3, 2], n: [0, 0, -1] },  // -z
  { idx: [1, 3, 7, 5], n: [1, 0, 0] },   // +x
  { idx: [0, 2, 6, 4], n: [-1, 0, 0] },  // -x
  { idx: [2, 3, 7, 6], n: [0, 1, 0] },   // +y
  { idx: [0, 1, 5, 4], n: [0, -1, 0] },  // -y
];
const L = [-0.352, 0.554, 0.755];        // light direction (normalised)
const HALF = [-0.188, 0.296, 0.937];     // half-vector (light + view) for specular
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

let splashCubes = [], gridSpan = 0;
let sCss = 0, scx = 0, scy = 0, sUnit = 0, sFocal = 20;
let splashRunning = false, splashRaf = 0;
let curAX = 0.22, curAY = 0;

// 4×6 bitmap font — only the glyphs used by the plate text. Missing chars are
// blank. Rows are top→bottom, '1' = pixel on (carved as a hole in the plate).
const FONT4x6 = {
  'A': ['0110', '1001', '1001', '1111', '1001', '1001'],
  'B': ['1110', '1001', '1110', '1001', '1001', '1110'],
  'C': ['0111', '1000', '1000', '1000', '1000', '0111'],
  '1': ['0100', '1100', '0100', '0100', '0100', '1110'],
  '2': ['1110', '0001', '0010', '0100', '1000', '1111'],
  '3': ['1110', '0001', '0110', '0001', '0001', '1110'],
  ' ': ['0000', '0000', '0000', '0000', '0000', '0000'],
};
const GLYPH_W = 4, GLYPH_H = 6;
const PLATE_TEXT = 'ABC 123';

function buildLogo() {
  const GW = 52, GH = 52;                  // square field, like the icon
  const grid = Array.from({ length: GH }, () => new Array(GW).fill(false));
  const set = (x, y, v) => { if (x >= 0 && x < GW && y >= 0 && y < GH) grid[y][x] = v; };
  // plate body (rounded: drop the four corner cells), centred in the square
  const plateW = 40, plateH = 18;
  const plateX = Math.round((GW - plateW) / 2), plateY = Math.round((GH - plateH) / 2);
  for (let y = 0; y < plateH; y++) for (let x = 0; x < plateW; x++) {
    const corner = (x === 0 || x === plateW - 1) && (y === 0 || y === plateH - 1);
    if (!corner) set(plateX + x, plateY + y, true);
  }
  // plate text, carved as holes, centred (glyph advance = GLYPH_W + 1 gap)
  const adv = GLYPH_W + 1;
  const tW = PLATE_TEXT.length * adv - 1;
  const tx = plateX + Math.round((plateW - tW) / 2), ty = plateY + Math.round((plateH - GLYPH_H) / 2);
  [...PLATE_TEXT].forEach((ch, s) => {
    const g = FONT4x6[ch] || FONT4x6[' '];
    for (let r = 0; r < GLYPH_H; r++) for (let c = 0; c < GLYPH_W; c++) if (g[r][c] === '1') set(tx + s * adv + c, ty + r, false);
  });
  // viewfinder corner brackets at the corners of the square field (like the icon)
  const M = 3, arm = 8, th = 2;
  const corners = [
    [M, M, 1, 1], [GW - 1 - M, M, -1, 1],
    [M, GH - 1 - M, 1, -1], [GW - 1 - M, GH - 1 - M, -1, -1],
  ];
  for (const [cxp, cyp, dx, dy] of corners) {
    for (let a = 0; a < arm; a++) for (let t = 0; t < th; t++) {
      set(cxp + dx * a, cyp + dy * t, true);   // horizontal arm
      set(cxp + dx * t, cyp + dy * a, true);   // vertical arm
    }
    set(cxp, cyp, false);                      // round the bracket: drop the outer corner pixel
  }
  // collect lit cells + bounding box
  const cells = [];
  let minx = GW, miny = GH, maxx = 0, maxy = 0;
  for (let y = 0; y < GH; y++) for (let x = 0; x < GW; x++) if (grid[y][x]) {
    cells.push([x, y]);
    if (x < minx) minx = x; if (x > maxx) maxx = x; if (y < miny) miny = y; if (y > maxy) maxy = y;
  }
  if (!cells.length) throw new Error('empty logo grid');
  const ccx = (minx + maxx) / 2, ccy = (miny + maxy) / 2;
  gridSpan = Math.max(maxx - minx, maxy - miny) + 1;
  const h = 0.42;                          // cube half-size in cell units (<0.5 => gaps => reads as pixels)
  splashCubes = cells.map(([x, y]) => {
    const X = x - ccx, Y = ccy - y;        // flip Y: grid y-down -> world y-up
    const vs = [];
    for (const sz of [-h, h]) for (const sy of [-h, h]) for (const sx of [-h, h]) vs.push([X + sx, Y + sy, sz]);
    return { vs, hueOff: (x * 13 + y * 29) % 360 };
  });
  sFocal = gridSpan * 1.4;                  // gentle perspective relative to logo size
}

function sizeSplash() {
  if (!splashCanvas || !gridSpan) return;
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  sCss = Math.min(window.innerWidth, window.innerHeight) * 0.9;
  splashCanvas.style.width = sCss + 'px'; splashCanvas.style.height = sCss + 'px';
  splashCanvas.width = Math.round(sCss * dpr); splashCanvas.height = Math.round(sCss * dpr);
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scx = sCss / 2; scy = sCss / 2;
  sUnit = sCss * 0.8 / gridSpan;           // fit with margin for tilt + perspective overhang
}

function rotMat(ax, ay) {                   // R = Rx(ax) * Ry(ay)
  const cx = Math.cos(ax), sx = Math.sin(ax), cy = Math.cos(ay), sy = Math.sin(ay);
  return [[cy, 0, sy], [sx * sy, cx, -sx * cy], [-cx * sy, sx, cx * cy]];
}

function drawSplash(t) {
  if (!sctx || !sUnit) return;
  const amp = reduceMotion ? 0.1 : 0.20, spd = reduceMotion ? 0.25 : 0.5;
  const theta = t * spd;
  const tAX = 0.22 + amp * Math.sin(theta);   // base tilt + circular precession
  const tAY = amp * Math.cos(theta);
  curAX += (tAX - curAX) * 0.1; curAY += (tAY - curAY) * 0.1;   // smoothing / inertia
  const R = rotMat(curAX, curAY);
  sctx.clearRect(0, 0, sCss, sCss);

  const faces = [];
  for (const cube of splashCubes) {
    const P = cube.vs.map(v => [
      R[0][0] * v[0] + R[0][1] * v[1] + R[0][2] * v[2],
      R[1][0] * v[0] + R[1][1] * v[1] + R[1][2] * v[2],
      R[2][0] * v[0] + R[2][1] * v[1] + R[2][2] * v[2],
    ]);
    for (const f of CUBE_FACES) {
      const n = f.n;
      const nz = R[2][0] * n[0] + R[2][1] * n[1] + R[2][2] * n[2];
      if (nz <= 0.001) continue;            // back-face cull
      const nx = R[0][0] * n[0] + R[0][1] * n[1] + R[0][2] * n[2];
      const ny = R[1][0] * n[0] + R[1][1] * n[1] + R[1][2] * n[2];
      const pts = []; let zc = 0;
      for (const i of f.idx) {
        const p = P[i], persp = sFocal / (sFocal - p[2]);
        pts.push(scx + p[0] * sUnit * persp, scy - p[1] * sUnit * persp);
        zc += p[2];
      }
      faces.push({ pts, zc: zc / 4, nx, ny, nz, hueOff: cube.hueOff });
    }
  }
  faces.sort((a, b) => a.zc - b.zc);        // painter's: far (small z) first

  for (const fc of faces) {
    const iri = 0.5 + 0.5 * (fc.nx * 0.7 + fc.ny * 0.3);
    let hue = (t * 16 + fc.hueOff + iri * 260 + (1 - fc.nz) * 150) % 360; if (hue < 0) hue += 360;
    const diff = Math.max(0, fc.nx * L[0] + fc.ny * L[1] + fc.nz * L[2]);
    const lum = 30 + 42 * diff;
    const p = fc.pts;
    sctx.beginPath(); sctx.moveTo(p[0], p[1]);
    sctx.lineTo(p[2], p[3]); sctx.lineTo(p[4], p[5]); sctx.lineTo(p[6], p[7]); sctx.closePath();
    sctx.fillStyle = `hsl(${hue.toFixed(0)}, 82%, ${lum.toFixed(0)}%)`;
    sctx.fill();
    sctx.strokeStyle = 'rgba(0,0,0,0.22)'; sctx.lineWidth = 0.6; sctx.stroke();
    const s = Math.max(0, fc.nx * HALF[0] + fc.ny * HALF[1] + fc.nz * HALF[2]);
    const spec = Math.pow(s, 22);
    if (spec > 0.02) { sctx.globalAlpha = Math.min(0.7, spec * 0.7); sctx.fillStyle = '#fff'; sctx.fill(); sctx.globalAlpha = 1; }
  }
}

function splashFrame(now) {
  if (!splashRunning) return;
  drawSplash(now / 1000);
  splashRaf = requestAnimationFrame(splashFrame);
}
function hideSplash() {
  if (!splashEl || splashEl.classList.contains('hide')) return;
  splashEl.classList.add('hide');
  splashRunning = false;
  cancelAnimationFrame(splashRaf);
}

function initSplash() {
  if (!splashCanvas) return;
  try { buildLogo(); }
  catch (e) { console.warn('splash logo unavailable:', e?.message || e); splashEl.style.display = 'none'; return; }
  sizeSplash();
  addEventListener('resize', sizeSplash);
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) cancelAnimationFrame(splashRaf);
    else if (splashRunning) splashRaf = requestAnimationFrame(splashFrame);
  });
  splashRunning = true;
  splashRaf = requestAnimationFrame(splashFrame);
}
window.alprDebug.splash = {
  initSplash, hideSplash, buildLogo, drawSplash, sizeSplash,
  get cubeCount() { return splashCubes.length; },
  get running() { return splashRunning; },
};
initSplash();

say(`Tap Start to load models and open the camera. (${APP_VERSION})`);
</script>
